name: Publish

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Check preview status
        uses: actions/github-script@v7
        with:
          script: |
            const { data: statuses } = await github.rest.repos.listCommitStatusesForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
            });
            const previewStatus = statuses.find(s => s.context === 'eds/preview');
            if (!previewStatus || previewStatus.state !== 'success') {
              core.setFailed('eds/preview status check must be successful before publish');
            }

      - name: Call AIO Publish Action
        id: aio
        env:
          AIO_ACTION_URL: ${{ secrets.AIO_ACTION_URL }}
          HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
        run: |
          PAYLOAD=$(jq -n \
            --arg mode "publish" \
            --arg owner "${{ github.repository_owner }}" \
            --arg repo "${{ github.event.repository.name }}" \
            --arg branch "main" \
            --arg commit "${{ github.event.pull_request.merge_commit_sha }}" \
            --argjson pr_number ${{ github.event.pull_request.number }} \
            --arg pr_head_sha "${{ github.event.pull_request.head.sha }}" \
            --argjson files '[]' \
            '{mode:$mode,contentOwner:$owner,contentRepo:$repo,sourceBranch:$branch,sourceCommit:$commit,changedFiles:$files,pullRequest:{number:$pr_number,headSha:$pr_head_sha,statusContext:"eds/preview"}}')

          TIMESTAMP=$(date +%s)
          NONCE=$(openssl rand -hex 16)
          SIGN_PAYLOAD="${TIMESTAMP}.${NONCE}.${PAYLOAD}"
          SIGNATURE=$(echo -n "$SIGN_PAYLOAD" | openssl dgst -sha256 -hmac "$HMAC_SECRET" | awk '{print $2}')

          curl -f -X POST "$AIO_ACTION_URL" \
            -H "Content-Type: application/json" \
            -H "X-Signature: sha256=${SIGNATURE}" \
            -H "X-Timestamp: ${TIMESTAMP}" \
            -H "X-Nonce: ${NONCE}" \
            -d "$PAYLOAD"

      - name: Update publish status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ steps.aio.outcome }}' === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: success ? 'success' : 'failure',
              context: 'eds/publish',
              description: success ? 'Published to live' : 'Publish failed',
            });
