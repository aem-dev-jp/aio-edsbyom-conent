name: Preview

on:
  push:
    branches: [stage]
  workflow_dispatch:

jobs:
  preview:
    runs-on: ubuntu-latest
    environment: stage
    concurrency:
      group: eds-pipeline
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed files
        id: changes
        run: |
          CHANGED=$(git diff --name-status HEAD~1 HEAD -- \
            '*.md' '*.jpg' '*.jpeg' '*.png' '*.gif' '*.svg' '*.webp' '*.ico' | \
            awk '{
              status = ($1=="M" ? "modified" : ($1=="A" ? "added" : "deleted"));
              print "{\"path\":\"" $2 "\",\"status\":\"" status "\"}"
            }' | jq -s '.')
          echo "files=$CHANGED" >> $GITHUB_OUTPUT

      - name: Set preview status pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'eds/preview',
              description: 'Preview in progress',
            });

      - name: Call AIO Preview Action
        id: aio
        env:
          AIO_ACTION_URL: ${{ secrets.AIO_ACTION_URL }}
          HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
        run: |
          PAYLOAD=$(jq -n \
            --arg mode "preview" \
            --arg owner "${{ github.repository_owner }}" \
            --arg repo "${{ github.event.repository.name }}" \
            --arg branch "stage" \
            --arg commit "${{ github.sha }}" \
            --argjson files '${{ steps.changes.outputs.files }}' \
            '{mode:$mode,contentOwner:$owner,contentRepo:$repo,sourceBranch:$branch,sourceCommit:$commit,changedFiles:$files}')

          TIMESTAMP=$(date +%s)
          NONCE=$(openssl rand -hex 16)
          SIGN_PAYLOAD="${TIMESTAMP}.${NONCE}.${PAYLOAD}"
          SIGNATURE=$(echo -n "$SIGN_PAYLOAD" | openssl dgst -sha256 -hmac "$HMAC_SECRET" | awk '{print $2}')

          curl -f -X POST "$AIO_ACTION_URL" \
            -H "Content-Type: application/json" \
            -H "X-Signature: sha256=${SIGNATURE}" \
            -H "X-Timestamp: ${TIMESTAMP}" \
            -H "X-Nonce: ${NONCE}" \
            -d "$PAYLOAD"

      - name: Update preview status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ steps.aio.outcome }}' === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              context: 'eds/preview',
              description: success ? 'Preview succeeded' : 'Preview failed',
            });
